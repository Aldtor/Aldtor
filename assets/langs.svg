<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes barFill {
        0% { width: 0%; }
        100% { width: var(--width); }
      }
      @keyframes slideIn {
        0% { opacity: 0; transform: translateY(-10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .lang-row { animation: slideIn 0.6s ease-out forwards; }
    </style>

    <linearGradient id="langGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4fd8" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <linearGradient id="langGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <linearGradient id="langGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="langGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <linearGradient id="langGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="langGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="langGrad7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="#0f172a" opacity="0.8" rx="10" />

  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ff4fd8" text-anchor="middle">
    Languages & Tools
  </text>

  <!-- Flutter -->
  <g class="lang-row" style="animation-delay: 0.05s">
    <text x="20" y="75" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">Flutter</text>
    <rect x="100" y="67" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="67" width="298" height="10" rx="5" fill="url(#langGrad1)" />
    <text x="470" y="75" font-family="Arial" font-size="11" fill="#ff4fd8" font-weight="bold">83%</text>
  </g>

  <!-- React -->
  <g class="lang-row" style="animation-delay: 0.1s">
    <text x="20" y="105" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">React</text>
    <rect x="100" y="97" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="97" width="306" height="10" rx="5" fill="url(#langGrad2)" />
    <text x="470" y="105" font-family="Arial" font-size="11" fill="#d946ef" font-weight="bold">85%</text>
  </g>

  <!-- TypeScript -->
  <g class="lang-row" style="animation-delay: 0.15s">
    <text x="20" y="135" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">TypeScript</text>
    <rect x="100" y="127" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="127" width="288" height="10" rx="5" fill="url(#langGrad3)" />
    <text x="470" y="135" font-family="Arial" font-size="11" fill="#7c3aed" font-weight="bold">80%</text>
  </g>

  <!-- Python -->
  <g class="lang-row" style="animation-delay: 0.2s">
    <text x="20" y="165" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">Python</text>
    <rect x="100" y="157" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="157" width="270" height="10" rx="5" fill="url(#langGrad4)" />
    <text x="470" y="165" font-family="Arial" font-size="11" fill="#06b6d4" font-weight="bold">75%</text>
  </g>

  <!-- Kotlin -->
  <g class="lang-row" style="animation-delay: 0.25s">
    <text x="20" y="195" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">Kotlin</text>
    <rect x="100" y="187" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="187" width="252" height="10" rx="5" fill="url(#langGrad5)" />
    <text x="470" y="195" font-family="Arial" font-size="11" fill="#10b981" font-weight="bold">70%</text>
  </g>

  <!-- Node.js -->
  <g class="lang-row" style="animation-delay: 0.3s">
    <text x="20" y="225" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">Node.js</text>
    <rect x="100" y="217" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="217" width="306" height="10" rx="5" fill="url(#langGrad6)" />
    <text x="470" y="225" font-family="Arial" font-size="11" fill="#f59e0b" font-weight="bold">85%</text>
  </g>

  <!-- C++ -->
  <g class="lang-row" style="animation-delay: 0.35s">
    <text x="20" y="255" font-family="Arial" font-size="12" fill="#a0e7e5" font-weight="600">C++</text>
    <rect x="100" y="247" width="360" height="10" rx="5" fill="#1a1a2e" />
    <rect x="100" y="247" width="234" height="10" rx="5" fill="url(#langGrad7)" />
    <text x="470" y="255" font-family="Arial" font-size="11" fill="#8b5cf6" font-weight="bold">65%</text>
  </g>

  <!-- Tools Section Title -->
  <text x="20" y="305" font-family="Arial" font-size="14" fill="#d946ef" font-weight="bold">
    Tools & Platforms
  </text>

  <!-- Tools Grid -->
  <g font-family="Arial" font-size="11" fill="#a0e7e5" text-anchor="middle">
    <!-- Row 1 -->
    <rect x="20" y="320" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#ff4fd8" stroke-width="1" />
    <text x="65" y="343" font-weight="600">Git</text>

    <rect x="125" y="320" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#d946ef" stroke-width="1" />
    <text x="170" y="343" font-weight="600">GitHub</text>

    <rect x="230" y="320" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1" />
    <text x="275" y="343" font-weight="600">Figma</text>

    <rect x="335" y="320" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1" />
    <text x="380" y="343" font-weight="600">Firebase</text>

    <!-- Row 2 -->
    <rect x="20" y="360" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#10b981" stroke-width="1" />
    <text x="65" y="383" font-weight="600">VS Code</text>

    <rect x="125" y="360" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" />
    <text x="170" y="383" font-weight="600">OpenAI</text>

    <rect x="230" y="360" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1" />
    <text x="275" y="383" font-weight="600">Gemini</text>

    <rect x="335" y="360" width="90" height="30" rx="6" fill="#1a1a2e" stroke="#ff4fd8" stroke-width="1" />
    <text x="380" y="383" font-weight="600">Supabase</text>
  </g>

  <!-- Border -->
  <rect width="500" height="400" fill="none" stroke="#d946ef" stroke-width="2" rx="10" opacity="0.3" />
</svg>