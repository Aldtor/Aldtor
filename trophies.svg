<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="100%" height="auto">
  <defs>
    <linearGradient id="card-bg-tr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140b29"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </linearGradient>
  </defs>

  <style>
    .card-title { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: 800; fill: #ffe066; letter-spacing: 1px; }
    .tr-title { font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; }
    .tr-rank { font-family: 'Fira Code', monospace; font-size: 11px; fill: #ffe066; font-weight: 700; }
  </style>

  <rect width="480" height="220" rx="16" fill="url(#card-bg-tr)" stroke="rgba(255,224,102,0.3)" stroke-width="1.5"/>

  <text x="30" y="40" class="card-title">🏆 ACHIEVEMENTS &amp; TROPHIES</text>
  <line x1="30" y1="52" x2="450" y2="52" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <g transform="translate(30, 70)">
    <g transform="translate(0, 0)">
      <rect width="200" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,224,102,0.2)"/>
      <text x="18" y="38" font-size="24">🏆</text>
      <text x="52" y="26" class="tr-title">Commits Master</text>
      <text x="52" y="44" class="tr-rank">RANK: GOLD S+</text>
    </g>
    <g transform="translate(220, 0)">
      <rect width="200" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(0,242,254,0.2)"/>
      <text x="18" y="38" font-size="24">🚀</text>
      <text x="52" y="26" class="tr-title">PR Creator</text>
      <text x="52" y="44" class="tr-rank" style="fill:#00f2fe">RANK: PLATINUM</text>
    </g>
    <g transform="translate(0, 72)">
      <rect width="200" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,42,133,0.2)"/>
      <text x="18" y="38" font-size="24">⚡</text>
      <text x="52" y="26" class="tr-title">Code Wizard</text>
      <text x="52" y="44" class="tr-rank" style="fill:#ff4da6">RANK: DIAMOND</text>
    </g>
    <g transform="translate(220, 72)">
      <rect width="200" height="60" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(56,239,125,0.2)"/>
      <text x="18" y="38" font-size="24">🌟</text>
      <text x="52" y="26" class="tr-title">Star Collector</text>
      <text x="52" y="44" class="tr-rank" style="fill:#38ef7d">RANK: MASTER</text>
    </g>
  </g>
</svg>